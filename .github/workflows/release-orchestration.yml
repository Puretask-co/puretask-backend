name: Cross-Repo Release Orchestration

on:
  workflow_dispatch:
    inputs:
      backend_repo:
        description: "Backend repository owner/name"
        required: true
        default: "Puretask-co/puretask-backend"
      frontend_repo:
        description: "Frontend repository owner/name"
        required: true
        default: "Puretask-co/-puretask-frontend"
      frontend_ref:
        description: "Frontend git ref (branch/tag/sha)"
        required: true
        default: "main"
      backend_ref:
        description: "Backend git ref (branch/tag/sha)"
        required: true
        default: "main"
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  actions: write

concurrency:
  group: cross-repo-release-${{ inputs.environment }}
  cancel-in-progress: false

env:
  BACKEND_REPO: ${{ inputs.backend_repo }}
  FRONTEND_REPO: ${{ inputs.frontend_repo }}

jobs:
  validate:
    name: Validate backend + frontend compatibility
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puretask_release_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPO }}
          ref: ${{ inputs.backend_ref }}

      - name: Setup Node.js (backend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Validate backend migrations
        run: npm run db:validate:migrations

      - name: Setup backend test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_release_test
          STRICT_MIGRATION_PATH: "1"
        run: |
          npm run db:setup:test
          E2E_CLIENT_EMAIL=client@test.com E2E_CLIENT_PASSWORD=TestPass123! E2E_CLEANER_EMAIL=cleaner@test.com E2E_CLEANER_PASSWORD=TestPass123! E2E_ADMIN_EMAIL=admin@test.com E2E_ADMIN_PASSWORD=TestPass123! npm run seed:e2e:users

      - name: Run backend deterministic test gate
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_release_test
          JWT_SECRET: test-release-secret-minimum-32-characters
          STRIPE_SECRET_KEY: sk_test_release
          STRIPE_WEBHOOK_SECRET: whsec_release
          N8N_WEBHOOK_SECRET: n8n_release
        run: npm run test:ci

      - name: Build backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_release_test
          JWT_SECRET: test-release-secret-minimum-32-characters
          STRIPE_SECRET_KEY: sk_test_release
          STRIPE_WEBHOOK_SECRET: whsec_release
          N8N_WEBHOOK_SECRET: n8n_release
        run: |
          npm run build
          nohup npm run dev > /tmp/backend-release.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:4000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health did not become ready"
          tail -n 200 /tmp/backend-release.log || true
          exit 1

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPO }}
          ref: ${{ inputs.frontend_ref }}
          path: frontend

      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend against backend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_BASE_URL: http://localhost:3001
          NEXT_PUBLIC_WS_URL: ws://localhost:4000
        run: npm run build

      - name: Frontend-backend contract check
        working-directory: frontend
        env:
          API_BASE: http://localhost:4000
          TEST_EMAIL: client@test.com
          TEST_PASSWORD: TestPass123!
        run: npm run test:api

      - name: Write validated release manifest
        run: |
          mkdir -p /tmp/release-manifest
          cat <<EOF > /tmp/release-manifest/validated-release-pair.txt
          backend_repo=${BACKEND_REPO}
          frontend_repo=${FRONTEND_REPO}
          backend_ref=${{ inputs.backend_ref }}
          frontend_ref=${{ inputs.frontend_ref }}
          environment=${{ inputs.environment }}
          orchestration_run_id=${{ github.run_id }}
          validated_at=${{ github.run_id }}-${{ github.run_attempt }}
          EOF

      - name: Upload validated release manifest
        uses: actions/upload-artifact@v4
        with:
          name: validated-release-pair
          path: /tmp/release-manifest/validated-release-pair.txt

  deploy:
    name: Deploy coordinated release
    needs: [validate]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: ${{ needs.validate.result == 'success' }}
    steps:
      - name: Download validated release manifest
        uses: actions/download-artifact@v4
        with:
          name: validated-release-pair
          path: /tmp/release-manifest

      - name: Print validated release manifest
        run: cat /tmp/release-manifest/validated-release-pair.txt

      - name: Dispatch backend release workflow
        env:
          GH_TOKEN: ${{ secrets.PURETASK_ORG_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${BACKEND_REPO}" \
            --field environment="${{ inputs.environment }}" \
            --field backend_ref="${{ inputs.backend_ref }}" \
            --field frontend_ref="${{ inputs.frontend_ref }}" \
            --field orchestration_run_id="${{ github.run_id }}" \
            --ref "${{ inputs.backend_ref }}"

      - name: Dispatch frontend release workflow
        env:
          GH_TOKEN: ${{ secrets.PURETASK_ORG_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${FRONTEND_REPO}" \
            --field environment="${{ inputs.environment }}" \
            --field backend_ref="${{ inputs.backend_ref }}" \
            --field frontend_ref="${{ inputs.frontend_ref }}" \
            --field orchestration_run_id="${{ github.run_id }}" \
            --ref "${{ inputs.frontend_ref }}"

      - name: Record coordinated release intent
        run: |
          echo "Validated release pair:"
          echo "backend_repo=${BACKEND_REPO}"
          echo "frontend_repo=${FRONTEND_REPO}"
          echo "backend_ref=${{ inputs.backend_ref }}"
          echo "frontend_ref=${{ inputs.frontend_ref }}"
          echo "environment=${{ inputs.environment }}"
          echo "Dispatched backend and frontend workflows."
