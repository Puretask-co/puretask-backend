# Verify migrations apply cleanly on a fresh database (Section 5).
# Runs consolidated schema then smoke query; fails if schema or smoke fails.
name: Migrations Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  migrations:
    name: Fresh DB + schema + smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puretask_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply consolidated schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_migrations
        run: node scripts/run-migration.js DB/migrations/000_CONSOLIDATED_SCHEMA.sql

      - name: Smoke query
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_migrations
        run: |
          node -e "
            const { Pool } = require('pg');
            const pool = new Pool({ connectionString: process.env.DATABASE_URL });
            pool.query(\"SELECT COUNT(*) AS n FROM information_schema.tables WHERE table_schema = 'public'\")
              .then(r => { if (r.rows[0].n < 1) throw new Error('No tables'); console.log('Tables:', r.rows[0].n); })
              .then(() => pool.end())
              .catch(e => { process.exitCode = 1; throw e; });
          "
