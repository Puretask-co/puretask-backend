# PureTask Backend - CI Tests
# Runs typecheck, lint, and tests on pull requests

name: Test

on:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Typecheck, Lint & Test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret-min-32-chars-for-ci' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_placeholder' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_placeholder' }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET || 'test-n8n-secret' }}
          NODE_ENV: test
        run: npm run test
        # Add DATABASE_URL to repo secrets for test runs. Without it, tests will fail.
