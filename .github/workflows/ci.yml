name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Check formatting (warn-only during baseline cleanup)
        run: npm run format:check
        continue-on-error: true
      
      - name: Run type check
        run: npm run typecheck

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puretask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_test
        run: npm run db:setup:test
      
      - name: Run tests with coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars-long
          STRIPE_SECRET_KEY: sk_test_fake_key_for_ci_testing_only
          STRIPE_WEBHOOK_SECRET: whsec_test_secret_for_ci
          N8N_WEBHOOK_SECRET: test-n8n-secret-for-ci
          REDIS_URL: ""
          USE_REDIS_RATE_LIMITING: "false"
        run: npm run test:coverage
      
      - name: Seed deterministic E2E users
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_test
          E2E_CLIENT_EMAIL: client@test.com
          E2E_CLIENT_PASSWORD: TestPass123!
          E2E_CLEANER_EMAIL: cleaner@test.com
          E2E_CLEANER_PASSWORD: TestPass123!
          E2E_ADMIN_EMAIL: admin@test.com
          E2E_ADMIN_PASSWORD: TestPass123!
        run: npm run seed:e2e:users

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
          retention-days: 7

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build

      - name: Verify dist workers are generated
        run: |
          test -f dist/workers/scheduler.js
          test -f dist/workers/runDurableJobWorker.js
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            scripts/
            package.json
            package-lock.json
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --audit-level=critical
        # Fail on critical; moderate/high reported but do not block (optional: remove continue-on-error to fail on high)
      
      - name: Run security scan script
        run: npm run security:scan
        continue-on-error: true

  deploy:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: [build, test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: deploy-artifacts

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_SERVICE: ${{ secrets.RAILWAY_API_SERVICE }}
        run: |
          cp -R deploy-artifacts/* .
          railway up --service "${RAILWAY_API_SERVICE}" --detach

      - name: Deploy scheduler service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SCHEDULER_SERVICE: ${{ secrets.RAILWAY_SCHEDULER_SERVICE }}
        run: railway up --service "${RAILWAY_SCHEDULER_SERVICE}" --detach

      - name: Deploy durable worker service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_WORKER_SERVICE: ${{ secrets.RAILWAY_WORKER_SERVICE }}
        run: railway up --service "${RAILWAY_WORKER_SERVICE}" --detach

      - name: Verify API health
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "${BACKEND_HEALTHCHECK_URL}" ]; then
            echo "BACKEND_HEALTHCHECK_URL not configured; skipping health probe."
            exit 0
          fi
          curl -fsS "${BACKEND_HEALTHCHECK_URL}" > /dev/null
