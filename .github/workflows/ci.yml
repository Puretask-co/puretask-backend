name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Check formatting (warn-only during baseline cleanup)
        run: npm run format:check
        continue-on-error: true
      
      - name: Run type check
        run: npm run typecheck

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puretask_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Validate migration files
        run: npm run db:validate:migrations
      
      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_test
          STRICT_MIGRATION_PATH: "1"
        run: npm run db:setup:test
      
      - name: Run deterministic CI tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars-long
          STRIPE_SECRET_KEY: sk_test_fake_key_for_ci_testing_only
          STRIPE_WEBHOOK_SECRET: whsec_test_secret_for_ci
          N8N_WEBHOOK_SECRET: test-n8n-secret-for-ci
          REDIS_URL: ""
          USE_REDIS_RATE_LIMITING: "false"
        run: npm run test:ci:coverage
      
      - name: Seed deterministic E2E users
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/puretask_test
          E2E_CLIENT_EMAIL: client@test.com
          E2E_CLIENT_PASSWORD: TestPass123!
          E2E_CLEANER_EMAIL: cleaner@test.com
          E2E_CLEANER_PASSWORD: TestPass123!
          E2E_ADMIN_EMAIL: admin@test.com
          E2E_ADMIN_PASSWORD: TestPass123!
        run: npm run seed:e2e:users

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
          retention-days: 7

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build

      - name: Verify dist workers are generated
        run: |
          test -f dist/workers/scheduler.js
          test -f dist/workers/runDurableJobWorker.js
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            scripts/
            package.json
            package-lock.json
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        # Playbook 1.5: blocking on high/critical vulnerabilities.
        # If a transitive dep flips to high and no fix exists yet, document the
        # exception in docs/active/SECURITY_EXCEPTIONS.md and tighten back.
        run: npm audit --audit-level=high
      
      - name: Run security scan script
        run: npm run security:scan
        continue-on-error: true

# Note: Railway deploys are handled by Railway's native GitHub integration
# (it watches main and runs the build defined in nixpacks.toml). The
# previous "Deploy Backend to Railway" job here duplicated that path,
# was missing RAILWAY_TOKEN, and was reliably red on every push. Removed
# 2026-05-13 — see docs/active/AUDIT_REANALYSIS_2026-05-13.md § B.15.
# If you ever want CI-driven deploys back (for the smoke-test step),
# restore from git history and set RAILWAY_TOKEN / RAILWAY_*_SERVICE in
# the production GitHub environment.
